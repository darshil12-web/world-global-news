{% extends 'base.html' %}
{% load static %}

{% block title %}Play Free Games | TechWorld{% endblock %}

{% block content %}
<section class="games-section" style="padding: 40px 0; background-color: var(--bg-secondary);">
    <div class="container" style="max-width: 1400px; margin: 0 auto;">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
            <h1 class="section-title" style="margin-bottom: 0;">Play Free Games</h1>
            <p style="color: var(--text-secondary); margin: 0;">Explore and play <span id="total-games-count">{{ total_count }}</span> free HTML5 web games.</p>
        </div>
        
        <div class="games-grid" id="games-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px;">
            {% include 'news/game_cards_partial.html' %}
        </div>
        
        <!-- Infinite Scroll Sentinel & Loading Indicator -->
        <div id="infinite-scroll-sentinel" style="height: 20px; margin-top: 20px;"></div>
        <div id="games-loading" style="display: none; justify-content: center; align-items: center; padding: 40px 0; width: 100%;">
            <div class="loading-spinner"></div>
        </div>
    </div>
</section>

<style>
    /* ── Game Grid ── */
    .game-card {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        aspect-ratio: 1 / 1;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        display: block;
    }

    .game-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.3s ease;
    }

    .game-card:hover {
        transform: scale(1.05);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25);
        z-index: 5;
    }

    .game-card:hover img {
        transform: scale(1.05);
    }

    /* ── Hover Overlay ── */
    .game-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, transparent 100%);
        padding: 40px 12px 12px;
        opacity: 0;
        transition: opacity 0.22s ease;
    }

    .game-overlay h3 {
        color: #fff;
        margin: 0;
        font-size: 0.9rem;
        font-weight: 700;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .game-card:hover .game-overlay {
        opacity: 1;
    }

    /* ── Loading Spinner ── */
    .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--accent-primary, #007bff);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        let nextPage = 2;
        let hasNext = {% if has_next %}true{% else %}false{% endif %};
        let isLoading = false;
        
        const grid = document.getElementById('games-grid');
        const sentinel = document.getElementById('infinite-scroll-sentinel');
        const loadingIndicator = document.getElementById('games-loading');
        
        if (!hasNext) {
            if (sentinel) sentinel.style.display = 'none';
            return;
        }
        
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && hasNext && !isLoading) {
                loadMoreGames();
            }
        }, {
            rootMargin: '300px' // Load when sentinel is within 300px of viewport to keep scroll seamless
        });
        
        observer.observe(sentinel);
        
        function loadMoreGames() {
            isLoading = true;
            loadingIndicator.style.display = 'flex';
            
            // Build ajax URL
            const url = `?page=${nextPage}&ajax=1`;
            
            fetch(url, {
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => {
                if (!response.ok) throw new Error('Network error');
                return response.json();
            })
            .then(data => {
                if (data.html) {
                    // Append new cards using a DocumentFragment or insertAdjacentHTML for max rendering performance
                    grid.insertAdjacentHTML('beforeend', data.html);
                    nextPage = data.next_page_number || (nextPage + 1);
                    hasNext = data.has_next;
                } else {
                    hasNext = false;
                }
                
                if (!hasNext && sentinel) {
                    observer.unobserve(sentinel);
                    sentinel.style.display = 'none';
                }
                
                isLoading = false;
                loadingIndicator.style.display = 'none';
            })
            .catch(err => {
                console.error('Failed to load games:', err);
                isLoading = false;
                loadingIndicator.style.display = 'none';
                
                // Retry after a short delay to keep user experience smooth
                setTimeout(() => {
                    if (hasNext && !isLoading) {
                        loadMoreGames();
                    }
                }, 3000);
            });
        }
    });
</script>
{% endblock %}
